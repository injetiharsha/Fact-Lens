experiment_name: stance_en_deberta_v1_vitaminc
model_name: microsoft/deberta-v3-base
model_init_path: checkpoints/stance/en/stance_en_deberta_v1_fever/tmp-checkpoint-5000
language_group: en

data:
  train_file: data/processed/stance/en_vitaminc/train.jsonl
  validation_file: data/processed/stance/en_vitaminc/val.jsonl
  test_file: data/processed/stance/en_vitaminc/test.jsonl
  text_a_column: claim
  text_b_column: evidence
  label_column: label

labels:
  - support
  - refute
  - neutral

training:
  output_dir: checkpoints/stance/en/stance_en_deberta_v1_vitaminc
  num_train_epochs: 2
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4
  max_seq_length: 512
  fp16: true
  gradient_checkpointing: false
  lr_scheduler_type: linear
  max_grad_norm: 1.0
  seed: 42
  dataloader_num_workers: 0

strategy:
  evaluation_strategy: steps
  eval_steps: 500
  save_strategy: steps
  save_steps: 1000
  logging_strategy: steps
  logging_steps: 100
  logging_first_step: true
  load_best_model_at_end: true
  metric_for_best_model: macro_f1
  greater_is_better: true
  save_total_limit: 2
  early_stopping_patience: 2
