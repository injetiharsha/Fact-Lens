experiment_name: relevance_multi_v1
model_name: xlm-roberta-base
language_group: indic_multi

data:
  train_file: data/processed/relevance/multilingual/train.jsonl
  validation_file: data/processed/relevance/multilingual/val.jsonl
  test_file: data/processed/relevance/multilingual/test.jsonl
  text_a_column: claim
  text_b_column: evidence
  label_column: label

training:
  output_dir: checkpoints/relevance/multi/relevance_multi_v1
  num_train_epochs: 3
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4
  max_seq_length: 512
  fp16: true
  gradient_checkpointing: false
  lr_scheduler_type: linear
  seed: 42
  dataloader_num_workers: 0

strategy:
  evaluation_strategy: steps
  eval_steps: 500
  save_strategy: steps
  save_steps: 1000
  logging_strategy: steps
  logging_steps: 100
  logging_first_step: true
  load_best_model_at_end: true
  metric_for_best_model: f1
  greater_is_better: true
  save_total_limit: 2
  early_stopping_patience: 2

