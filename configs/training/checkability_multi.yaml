experiment_name: checkability_multi_v1
model_name: xlm-roberta-base

labels:
  - FACTUAL_CLAIM
  - PERSONAL_STATEMENT
  - OPINION
  - QUESTION_OR_REWRITE
  - OTHER_UNCHECKABLE

data:
  train_file: data/processed/checkability/multilingual/train.jsonl
  validation_file: data/processed/checkability/multilingual/val.jsonl
  test_file: data/processed/checkability/multilingual/test.jsonl
  text_column: text
  label_column: label_id

training:
  output_dir: checkpoints/checkability/multi/checkability_multi_v1
  seed: 42
  num_train_epochs: 5
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_seq_length: 256
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 1
  fp16: true
  gradient_checkpointing: false
  lr_scheduler_type: linear
  dataloader_num_workers: 2
  resume_from_checkpoint:

strategy:
  evaluation_strategy: steps
  save_strategy: steps
  eval_steps: 100
  save_steps: 100
  logging_strategy: steps
  logging_steps: 50
  logging_first_step: true
  load_best_model_at_end: true
  metric_for_best_model: eval_macro_f1
  greater_is_better: true
  save_total_limit: 2
  early_stopping_patience: 3
