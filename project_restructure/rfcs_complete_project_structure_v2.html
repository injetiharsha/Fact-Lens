function render(nodes, container) {
  nodes.forEach(n => {
    const wrap = document.createElement('div');
    const row = document.createElement('div');
    row.className = 'row ' + (n.k === 'dir' ? 't-dir' : (n.cls || 't-txt'));

    if (n.k === 'dir') {
      const c = document.createElement('span');
      c.className = 'caret' + (n.open ? ' open' : '');
      c.textContent = '▶';
      row.appendChild(c);
    } else {
      const s = document.createElement('span'); s.className = 'spacer'; row.appendChild(s);
    }

    const nm = document.createElement('span');
    nm.className = 'fname';
    nm.textContent = n.n;
    row.appendChild(nm);

    if (n.b) {
      const bText = {
        'b-4050':'4050','b-k1':'kaggle 1','b-k2':'kaggle 2',
        'b-c1':'colab 1','b-c2':'colab 2','b-has':'existing',
        'b-new':'train','b-off':'off-shelf','b-cfg':'config','b-data':'dataset'
      }[n.b];
      if (bText) {
        const b = document.createElement('span');
        b.className = 'badge ' + n.b;
        b.textContent = bText;
        row.appendChild(b);
      }
    }

    if (n.tag) {
      const t = document.createElement('span');
      t.className = 'tag';
      t.textContent = '// ' + n.tag;
      row.appendChild(t);
    }

    wrap.appendChild(row);

    if (n.k === 'dir' && n.ch && n.ch.length) {
      const indent = document.createElement('div');
      indent.className = 'indent' + (n.open ? '' : ' collapsed');
      render(n.ch, indent);
      wrap.appendChild(indent);
      row.addEventListener('click', () => {
        const isOpen = !indent.classList.contains('collapsed');
        indent.classList.toggle('collapsed', isOpen);
        row.querySelector('.caret').classList.toggle('open', !isOpen);
      });
    }

    container.appendChild(wrap);
  });
}

render(tree, document.getElementById('tree'));
