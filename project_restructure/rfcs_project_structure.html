
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-mono,monospace);font-size:12.5px;line-height:1.6;color:var(--color-text-primary)}
.tree{padding:8px 0}
.node{display:flex;flex-direction:column}
.row{display:flex;align-items:center;gap:6px;padding:2px 6px;border-radius:4px;cursor:pointer;user-select:none;transition:background .12s}
.row:hover{background:var(--color-background-secondary)}
.indent{display:flex;flex-direction:column;padding-left:18px;border-left:1px solid var(--color-border-tertiary);margin-left:9px}
.caret{font-size:9px;color:var(--color-text-tertiary);width:10px;flex-shrink:0;transition:transform .15s}
.caret.open{transform:rotate(90deg)}
.spacer{width:10px;flex-shrink:0}
.name{flex:1}
.badge{font-size:10px;padding:1px 6px;border-radius:10px;flex-shrink:0;font-family:var(--font-sans)}
.tag{font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-sans);margin-left:4px}
.collapsed{display:none}

.t-root  .name{color:var(--color-text-primary);font-weight:500}
.t-dir   .name{color:var(--color-text-primary)}
.t-file  .name{color:var(--color-text-secondary)}
.t-nb    .name{color:#854F0B}
.t-py    .name{color:#185FA5}
.t-yaml  .name{color:#0F6E56}
.t-json  .name{color:#993C1D}

.b-train {background:#FAEEDA;color:#633806}
.b-ckpt  {background:#EEEDFE;color:#3C3489}
.b-data  {background:#EAF3DE;color:#27500A}
.b-pipe  {background:#E6F1FB;color:#0C447C}
.b-cfg   {background:#E1F5EE;color:#085041}
.b-exists{background:#F1EFE8;color:#444441}
.b-new   {background:#FCEBEB;color:#791F1F}

.legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 6px 4px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:6px}
.legend span{font-size:11px;font-family:var(--font-sans);padding:2px 8px;border-radius:10px}
.hdr{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-sans);padding:4px 6px 2px;letter-spacing:.04em}
</style>

<div class="legend">
  <span class="b-train">training notebook</span>
  <span class="b-ckpt">checkpoint</span>
  <span class="b-data">dataset</span>
  <span class="b-pipe">pipeline</span>
  <span class="b-cfg">config / scoring</span>
  <span class="b-exists">existing model</span>
  <span class="b-new">train this</span>
</div>

<div class="tree" id="tree"></div>

function render(nodes, container) {
  nodes.forEach(n => {
    const wrap = document.createElement('div');
    wrap.className = 'node';
    const row = document.createElement('div');
    row.className = 'row ' + (n.type === 'dir' ? 't-dir' : (n.cls || 't-file'));

    if (n.type === 'dir') {
      const caret = document.createElement('span');
      caret.className = 'caret' + (n.open ? ' open' : '');
      caret.textContent = '▶';
      row.appendChild(caret);
    } else {
      const sp = document.createElement('span');
      sp.className = 'spacer';
      row.appendChild(sp);
    }

    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = n.name;
    row.appendChild(name);

    if (n.badge) {
      const b = document.createElement('span');
      b.className = 'badge ' + n.badge;
      b.textContent = n.badge === 'b-exists' ? 'existing' : n.badge === 'b-new' ? 'train' : n.badge === 'b-train' ? 'notebook' : n.badge === 'b-pipe' ? 'runtime' : n.badge === 'b-cfg' ? 'config' : '';
      if(b.textContent) row.appendChild(b);
    }

    if (n.tag) {
      const t = document.createElement('span');
      t.className = 'tag';
      t.textContent = '// ' + n.tag;
      row.appendChild(t);
    }

    wrap.appendChild(row);

    if (n.type === 'dir' && n.children && n.children.length) {
      const indent = document.createElement('div');
      indent.className = 'indent' + (n.open ? '' : ' collapsed');
      render(n.children, indent);
      wrap.appendChild(indent);

      row.addEventListener('click', () => {
        const open = !indent.classList.contains('collapsed');
        indent.classList.toggle('collapsed', open);
        row.querySelector('.caret').classList.toggle('open', !open);
      });
    }

    container.appendChild(wrap);
  });
}

render(tree, document.getElementById('tree'));
</script>
